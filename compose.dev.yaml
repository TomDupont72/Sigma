services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sigma-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.docker
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NGINX_CONF: nginx.dev.conf
    container_name: sigma-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
